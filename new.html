<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>ERP Kawasan Berikat</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>

body{
background:#f1f5f9;
font-family:Inter, sans-serif;
}

.sidebar{
position:fixed;
height:100%;
width:250px;
background:#0f172a;
color:white;
}

.sidebar h4{
padding:20px;
}

.sidebar a{
display:block;
padding:12px 20px;
color:#cbd5f1;
text-decoration:none;
}

.sidebar a:hover{
background:#334155;
color:white;
}

.topbar{
margin-left:250px;
height:60px;
background:white;
border-bottom:1px solid #e5e7eb;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
}

.content{
margin-left:250px;
padding:25px;
}

.card{
border:none;
border-radius:12px;
box-shadow:0 4px 14px rgba(0,0,0,0.06);
}

.stat-card{
padding:20px;
border-radius:10px;
background:white;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h4>ERP KB</h4>

<a href="#"><i class="fa fa-dashboard"></i> Dashboard</a>
<a href="#"><i class="fa fa-box"></i> Master Barang</a>
<a href="#"><i class="fa fa-industry"></i> Produksi</a>
<a href="#"><i class="fa fa-truck"></i> Incoming</a>
<a href="#"><i class="fa fa-arrow-right"></i> Outgoing</a>
<a href="#"><i class="fa fa-file"></i> Laporan</a>

</div>


<!-- TOPBAR -->

<div class="topbar">

<h5>IT Inventory Kawasan Berikat</h5>

<div>

<i class="fa fa-user"></i> Admin

</div>

</div>


<!-- CONTENT -->

<div class="content">

<div class="container-fluid">

<div class="row g-3">

<div class="col-md-3">

<div class="stat-card">

<h6>Total Barang</h6>
<h3>1240</h3>

</div>

</div>

<div class="col-md-3">

<div class="stat-card">

<h6>Stok Bahan Baku</h6>
<h3>540</h3>

</div>

</div>

<div class="col-md-3">

<div class="stat-card">

<h6>Barang Jadi</h6>
<h3>380</h3>

</div>

</div>

<div class="col-md-3">

<div class="stat-card">

<h6>WIP</h6>
<h3>120</h3>

</div>

</div>

</div>

<br>

<div class="card">

<div class="card-header d-flex justify-content-between">

<h5>Master Barang</h5>

<button class="btn btn-primary" id="add_barang">
<i class="fa fa-plus"></i> Tambah Barang
</button>

</div>

<div class="card-body">

<table class="table table-bordered">

<thead>

<tr>
<th>No</th>
<th>Kode Barang</th>
<th>Nama Barang</th>
<th>Kategori</th>
<th>Satuan</th>
<th>Aksi</th>
</tr>

</thead>

<tbody>

<tr>

<td>1</td>
<td>BB001</td>
<td>Bahan Kimia A</td>
<td>Bahan Baku</td>
<td>Kg</td>

<td>

<button class="btn btn-sm btn-warning">
<i class="fa fa-edit"></i>
</button>

<button class="btn btn-sm btn-danger">
<i class="fa fa-trash"></i>
</button>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</div>


<!-- MODAL -->

<div class="modal fade" id="modal_barang">

<div class="modal-dialog modal-lg">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title">Tambah Barang</h5>

<button class="btn-close" data-bs-dismiss="modal"></button>

</div>

<div class="modal-body" id="isi_barang">

<form>

<div class="mb-3">

<label>Kode Barang</label>
<input type="text" class="form-control">

</div>

<div class="mb-3">

<label>Nama Barang</label>
<input type="text" class="form-control">

</div>

<div class="mb-3">

<label>Satuan</label>
<input type="text" class="form-control">

</div>

<button class="btn btn-primary">Simpan</button>

</form>

</div>

</div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

$("#add_barang").click(function(){

var modal = new bootstrap.Modal(document.getElementById('modal_barang'));

modal.show();

});

</script>

</body>

</html>
